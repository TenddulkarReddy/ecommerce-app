<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold tracking-wider">🛍️ TechStore</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userStatus" class="text-sm bg-indigo-700 px-3 py-1.5 rounded-md hidden"></span>
                    <button id="logoutBtn" onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-md font-medium transition hidden">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section id="authSection" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 my-12">
            <div class="flex justify-center space-x-4 mb-6 border-b pb-4">
                <button id="toggleLogin" onclick="switchAuthMode('login')" class="text-lg font-semibold text-indigo-600 border-b-2 border-indigo-600 pb-2 focus:outline-none">Login</button>
                <button id="toggleRegister" onclick="switchAuthMode('register')" class="text-lg font-semibold text-gray-400 pb-2 focus:outline-none">Register</button>
            </div>

            <div id="authAlert" class="hidden mb-4 p-3 rounded text-sm font-medium"></div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div id="roleWrapper" class="mb-6 hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Account Role</label>
                    <select id="role" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="Customer / Shopper">Customer / Shopper</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" id="authSubmitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition shadow-sm">Sign In</button>
            </form>
        </section>

        <section id="storeSection" class="hidden space-y-12">
            
            <div id="adminProductPanel" class="hidden bg-white p-6 rounded-xl shadow-md border border-gray-100 max-w-2xl mx-auto">
                <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center">🛠️ Admin Controls: Add Product</h3>
                <form onsubmit="addProduct(event)" class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Product Name</label>
                        <input type="text" id="pName" required class="w-full px-3 py-1.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Description</label>
                        <textarea id="pDesc" rows="2" required class="w-full px-3 py-1.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Product Image Link URL</label>
                        <input type="url" id="pImgUrl" placeholder="https://images.unsplash.com/photo-1531297484001-80022131f5a1" class="w-full px-3 py-1.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Price ($)</label>
                        <input type="number" step="0.01" id="pPrice" required class="w-full px-3 py-1.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Stock Units</label>
                        <input type="number" id="pStock" required class="w-full px-3 py-1.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="sm:col-span-2 mt-2">
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg transition text-sm">Save Product to Catalog</button>
                    </div>
                </form>
            </div>

            <div>
                <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center">⚡ Available Hardware Products</h2>
                <div id="productGrid" class="grid grid-cols-1 gap-y-10 gap-x-6 sm:grid-cols-2 lg:grid-cols-3 xl:gap-x-8"></div>
            </div>

            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
                    <h2 class="text-lg font-bold text-gray-900">📦 Live Orders Ledger</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
                        <thead class="bg-gray-100 text-xs uppercase tracking-wider font-semibold text-gray-600">
                            <tr>
                                <th class="px-6 py-3">Order ID</th>
                                <th class="px-6 py-3">User</th>
                                <th class="px-6 py-3">Total Cost</th>
                                <th class="px-6 py-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        let authMode = 'login';
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const username = localStorage.getItem('username');
            const userId = localStorage.getItem('userId');

            if (token && username && userId) {
                currentUser = { token, role, username, id: userId };
                showStorefront();
            }
        });

        function switchAuthMode(mode) {
            authMode = mode;
            const toggleLogin = document.getElementById('toggleLogin');
            const toggleRegister = document.getElementById('toggleRegister');
            const roleWrapper = document.getElementById('roleWrapper');
            const authSubmitBtn = document.getElementById('authSubmitBtn');
            const alertBox = document.getElementById('authAlert');
            
            alertBox.className = 'hidden mb-4 p-3 rounded text-sm font-medium';

            if (mode === 'register') {
                toggleRegister.className = "text-lg font-semibold text-indigo-600 border-b-2 border-indigo-600 pb-2 focus:outline-none";
                toggleLogin.className = "text-lg font-semibold text-gray-400 pb-2 focus:outline-none";
                roleWrapper.classList.remove('hidden');
                authSubmitBtn.innerText = 'Create Account';
            } else {
                toggleLogin.className = "text-lg font-semibold text-indigo-600 border-b-2 border-indigo-600 pb-2 focus:outline-none";
                toggleRegister.className = "text-lg font-semibold text-gray-400 pb-2 focus:outline-none";
                roleWrapper.classList.add('hidden');
                authSubmitBtn.innerText = 'Sign In';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const alertBox = document.getElementById('authAlert');
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value;
            const roleInp = document.getElementById('role').value;

            const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            const bodyData = authMode === 'login' 
                ? { username: userInp, password: passInp }
                : { username: userInp, password: passInp, role: roleInp };

            try {
                const targetUrl = window.location.origin + endpoint;
                const res = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Server interaction failed.');

                if (authMode === 'login') {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role); 
                    localStorage.setItem('username', userInp);
                    localStorage.setItem('userId', data.id); // Save real database row identifier safely
                    
                    currentUser = { token: data.token, role: data.role, username: userInp, id: data.id };
                    showStorefront();
                } else {
                    alertBox.className = "mb-4 p-3 rounded text-sm font-medium bg-emerald-50 text-emerald-700 border border-emerald-200";
                    alertBox.innerText = "Registration complete! You can now switch to Login.";
                    document.getElementById('authForm').reset();
                }
            } catch (err) {
                alertBox.className = "mb-4 p-3 rounded text-sm font-medium bg-red-50 text-red-700 border border-red-200";
                alertBox.innerText = err.message;
            }
        }

        function showStorefront() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('storeSection').classList.remove('hidden');
            
            const statusLabel = document.getElementById('userStatus');
            statusLabel.innerText = "👤 " + currentUser.username + " (" + currentUser.role + ")";
            statusLabel.classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            if (currentUser.role.toLowerCase().includes('admin')) {
                document.getElementById('adminProductPanel').classList.remove('hidden');
            } else {
                document.getElementById('adminProductPanel').classList.add('hidden');
            }

            fetchProducts();
            fetchOrders();
        }

        async function fetchProducts() {
            const grid = document.getElementById('productGrid');
            try {
                const res = await fetch(window.location.origin + '/api/products');
                const products = await res.json();
                
                if(products.length === 0) {
                    grid.innerHTML = `<p class="text-gray-500 text-sm">No products added yet.</p>`;
                    return;
                }

                const isAdmin = currentUser && currentUser.role.toLowerCase().includes('admin');

                grid.innerHTML = products.map(p => {
                    const img = p.image_url || 'https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=500&auto=format&fit=crop&q=60';
                    const deleteBtnHtml = isAdmin 
                        ? `<button onclick="deleteProduct(${p.id})" class="absolute top-3 right-3 bg-red-600 hover:bg-red-700 text-white p-2 rounded-full shadow-md z-10 transition focus:outline-none">🗑️</button>` 
                        : '';

                    return `
                        <div class="group bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition relative flex flex-col justify-between">
                            ${deleteBtnHtml}
                            <div class="h-48 w-full bg-gray-100 overflow-hidden relative">
                                <img src="${img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                            </div>
                            <div class="p-5 flex-1 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="text-md font-bold text-gray-900">${p.name}</h3>
                                        <span class="text-indigo-600 font-bold text-md">$${parseFloat(p.price).toFixed(2)}</span>
                                    </div>
                                    <p class="text-xs text-gray-500 mb-4 line-clamp-3">${p.description}</p>
                                </div>
                                <div class="mt-4 pt-3 border-t border-gray-50 flex items-center justify-between">
                                    <span class="text-xs text-gray-400">In Stock: <strong class="text-gray-700">${p.stock}</strong></span>
                                    <button onclick="placeOrder(${p.id}, ${p.price})" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-1.5 rounded-lg text-xs transition shadow-sm">
                                        Quick Buy
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = `<p class="text-red-500 text-sm">Catalog failed to synchronize.</p>`;
            }
        }

        async function addProduct(e) {
            e.preventDefault();
            const imgVal = document.getElementById('pImgUrl').value.trim();
            const defaultImg = 'https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=500&auto=format&fit=crop&q=60';
            
            const bodyData = {
                name: document.getElementById('pName').value.trim(),
                description: document.getElementById('pDesc').value.trim(),
                price: parseFloat(document.getElementById('pPrice').value),
                stock: parseInt(document.getElementById('pStock').value),
                image_url: imgVal ? imgVal : defaultImg
            };

            try {
                const res = await fetch(window.location.origin + '/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                if (!res.ok) throw new Error('Failed to create new product.');
                
                document.getElementById('pName').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pStock').value = '';
                document.getElementById('pImgUrl').value = '';
                
                fetchProducts();
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you absolutely sure you want to delete this product from your inventory?')) return;
            try {
                const res = await fetch(window.location.origin + `/api/products/${id}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Failed to complete delete request.');
                fetchProducts();
            } catch (err) {
                alert(err.message);
            }
        }

        async function fetchOrders() {
            const tableBody = document.getElementById('ordersTableBody');
            try {
                const res = await fetch(window.location.origin + '/api/orders');
                const orders = await res.json();

                if(orders.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-gray-400 text-xs">No active order records found.</td></tr>`;
                    return;
                }

                const isAdmin = currentUser && currentUser.role.toLowerCase().includes('admin');

                tableBody.innerHTML = orders.map(o => {
                    const currentStatus = o.status || 'Pending';
                    
                    let badgeColor = 'bg-amber-50 text-amber-700 border-amber-100';
                    if (currentStatus === 'Processing') badgeColor = 'bg-blue-50 text-blue-700 border-blue-100';
                    if (currentStatus === 'Shipped') badgeColor = 'bg-indigo-50 text-indigo-700 border-indigo-100';
                    if (currentStatus === 'Delivered') badgeColor = 'bg-emerald-50 text-emerald-700 border-emerald-100';

                    let statusHtml = '';
                    if (isAdmin) {
                        statusHtml = `
                            <select onchange="updateOrderStatus(${o.id}, this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-1.5 font-medium outline-none">
                                <option value="Pending" ${currentStatus === 'Pending' ? 'selected' : ''}>⏳ Pending</option>
                                <option value="Processing" ${currentStatus === 'Processing' ? 'selected' : ''}>⚙️ Processing</option>
                                <option value="Shipped" ${currentStatus === 'Shipped' ? 'selected' : ''}>📦 Shipped</option>
                                <option value="Delivered" ${currentStatus === 'Delivered' ? 'selected' : ''}>✅ Delivered</option>
                            </select>
                        `;
                    } else {
                        statusHtml = `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${badgeColor}">${currentStatus}</span>`;
                    }

                    return `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 whitespace-nowrap font-mono text-xs text-gray-500">#ORD-${o.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${o.username || 'System User'}</td>
                            <td class="px-6 py-4 whitespace-nowrap font-semibold text-gray-900">$${parseFloat(o.total_amount).toFixed(2)}</td>
                            <td class="px-6 py-4 whitespace-nowrap">${statusHtml}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-red-500 text-xs">Failed to synchronize ledger data.</td></tr>`;
            }
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const res = await fetch(window.location.origin + `/api/orders/${orderId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!res.ok) throw new Error('Database rejected status modification.');
                fetchOrders();
            } catch (err) {
                alert(err.message);
            }
        }

        // DYNAMIC FEATURE: SUBMITS WITH ACTUAL CURRENT LOGGED-IN ACCOUNT ID
        async function placeOrder(productId, price) {
            if (!currentUser || !currentUser.id) {
                alert('Session expired. Please log in again.');
                return logout();
            }

            const bodyData = {
                user_id: parseInt(currentUser.id), // Dynamically maps out the user ID instead of '1'
                total_amount: parseFloat(price),
                status: 'Pending' 
            };

            try {
                const res = await fetch(window.location.origin + '/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                if (!res.ok) throw new Error('Order creation rejected.');
                
                alert('🎉 Transaction submitted successfully!');
                fetchOrders();
            } catch (err) {
                alert(err.message);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
